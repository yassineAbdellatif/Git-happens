sonar.projectKey=yassineAbdellatif_Git-happens
sonar.organization=githappens

# Project information
sonar.projectName=Git-happens
sonar.projectVersion=1.0

# Source code paths
sonar.sources=app
sonar.tests=tests

# Exclude from analysis
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.ts,**/*.test.tsx,**/dist/**,**/build/**,**/__mocks__/**

# Test coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/tests/**

# Branch configuration
sonar.branch.name=main

# Pull Request decoration
sonar.pullrequest.provider=github
sonar.pullrequest.github.repository=yassineAbdellatif/Git-happens

# Source encoding
sonar.sourceEncoding=UTF-8
coverage:
  status:
    project:
      default:
        target: 70%          # Minimum overall coverage
        threshold: 5%        # Allow 5% drop before failing
    patch:
      default:
        target: 80%          # New code must be 80% covered
        informational: false # Fail PR if patch coverage is below target

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "tests/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/coverage/**"
  - "**/__mocks__/**"

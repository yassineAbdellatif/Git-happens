name: Acceptance Test
description: Define acceptance test description and execution steps
title: "[Acceptance Test X.X]"
labels: ["acceptance test"]
assignees: []

body:
  - type: textarea
    id: criteria
    attributes:
      label: 📝 Acceptance Test Criteria
      description: Clearly describe what functionality is being validated and what must be true for the test to pass.
      placeholder: Describe the expected behavior and validation conditions.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🧪 Test Steps
      description: List the steps required to execute this acceptance test.
      placeholder: |
        1. 
        2. 
        3. 
        4.
    validations:
      required: true